<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KPI CEE Analyzer - Selezione KPI</title>
    <link href="/static/css/style.css" rel="stylesheet">
</head>
<body>
    <div class="container">
        <h1>KPI CEE Analyzer</h1>
        <p class="version">Versione 0.3.4 Beta</p>
        
        <form action="/input" method="post">
            <h2>Seleziona i KPI da calcolare:</h2>
            
            {% for category in categories %}
                <div class="category">
                    <h3>{{ category.name }}</h3>
                    {% for kpi in category.kpis %}
                        <div class="kpi-item">
                            <label>
                                <input type="checkbox" name="kpi_keys" value="{{ kpi.key }}">
                                <strong>{{ kpi.name }}</strong>
                            </label>
                            <p class="description">{{ kpi.description }}</p>
                        </div>
                    {% endfor %}
                </div>
            {% endfor %}
            
            <button type="submit" class="btn-primary">Procedi all'inserimento dati</button>
        </form>
    </div>
</body>
</html>
