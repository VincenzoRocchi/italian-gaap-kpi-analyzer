<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dati Bilancio</title>
    <link href="/static/css/style.css" rel="stylesheet">
</head>
<body>
    <div class="container">
        <h1><strong>Inserisci</strong> i Dati di bilancio</h1>
        
        <form action="/calculate" method="post" id="input-data-form">
            <div class="row g-4">
                <!-- ATTIVO Column -->
                <div class="col-md-6">
                    <div class="card h-100 shadow-sm">
                        <div class="card-header fw-bold">ATTIVO</div>
                        <div class="card-body p-3">
                            {% for item in assets %}
                                <div class="mb-2 input-group input-group-sm">
                                    <span class="input-group-text" style="width: 70px;">Pos. {{ item.pos }}</span>
                                    <input type="text" class="form-control" name="pos_{{ item.pos }}" 
                                           value="{{ item.value }}" inputmode="decimal" placeholder="0.00">
                                </div>
                                <small class="text-muted d-block mb-1 ms-1">{{ item.name }}</small>
                            {% endfor %}
                        </div>
                    </div>
                </div>
                
                <!-- PASSIVO E PATRIMONIO NETTO Column -->
                <div class="col-md-6">
                    <div class="card h-100 shadow-sm">
                        <div class="card-header fw-bold">PASSIVO E PATRIMONIO NETTO</div>
                        <div class="card-body p-3">
                            {% for item in liabilities_equity %}
                                <div class="mb-2 input-group input-group-sm">
                                    <span class="input-group-text" style="width: 70px;">Pos. {{ item.pos }}</span>
                                    <input type="text" class="form-control" name="pos_{{ item.pos }}" 
                                           value="{{ item.value }}" inputmode="decimal" placeholder="0.00">
                                </div>
                                <small class="text-muted d-block mb-1 ms-1">{{ item.name }}</small>
                            {% endfor %}
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="mt-4 d-flex justify-content-end">
                <a href="/" class="btn btn-secondary me-2">Indietro</a>
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-calculator-fill"></i> Calcola KPI
                </button>
            </div>
        </form>
    </div>
</body>
</html>
