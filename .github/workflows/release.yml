name: Build and Release

on:
  push:
    tags:
      - 'v0.4.*'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Build
      run: cargo build --release

    - name: Create Linux tarball
      run: |
        mkdir -p kpi_cee
        cp target/release/italian-gaap-kpi-analyzer kpi_cee/kpi_cee
        tar -czvf kpi_cee-linux.tar.gz kpi_cee

    - name: Upload Linux artifact
      uses: actions/upload-artifact@v4
      with:
        name: kpi_cee-linux
        path: kpi_cee-linux.tar.gz

  release:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download artifact
      uses: actions/download-artifact@v4
      with:
        name: kpi_cee-linux

    - name: Create Release
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        TAG: ${{ github.ref_name }}
      run: |
        ls -la
        cat > release_notes.md << 'EOF'
        ## Release ${{ github.ref_name }}
        
        KPI CEE Analyzer - Rust version.
        
        ### How to Run:
        **Linux:** `tar -xzvf kpi_cee-linux.tar.gz && cd kpi_cee && ./italian-gaap-kpi-analyzer`
        EOF
        
        gh release create ${TAG} \
          --title "Release ${TAG}" \
          --notes-file release_notes.md \
          kpi_cee-linux.tar.gz
