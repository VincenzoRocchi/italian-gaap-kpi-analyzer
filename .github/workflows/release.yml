name: Build and Release Rust Executables

on:
  push:
    tags:
      - 'v0.4.*' # Trigger on Rust version tags

jobs:
  build:
    name: Build on ${{ matrix.os_name }}
    runs-on: ${{ matrix.os_platform }}
    strategy:
      matrix:
        include:
          - os_name: linux
            os_platform: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset_file_name: kpi_cee-linux
            packaged_asset: kpi_cee-linux.tar.gz
          - os_name: windows
            os_platform: windows-latest
            target: x86_64-pc-windows-gnu
            asset_file_name: kpi_cee-windows
            packaged_asset: kpi_cee-windows.zip

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ matrix.target }}

    - name: Build with Cargo (native)
      run: cargo build --release

    - name: Package executable (Linux)
      if: matrix.os_name == 'linux'
      run: tar -czvf ${{ matrix.packaged_asset }} -C target/release kpi_cee

    - name: Package executable (Windows)
      if: matrix.os_name == 'windows'
      run: Compress-Archive -Path target/release/kpi_cee.exe -DestinationPath ${{ matrix.packaged_asset }}
      shell: powershell

    - name: Upload distributable as artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.asset_file_name }}
        path: ${{ matrix.packaged_asset }}

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download all build artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Create Release Notes and Upload Assets
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        TAG: ${{ github.ref_name }}
      run: |
        cat > release_notes.md << 'EOF'
        ## Release ${{ github.ref_name }}

        Automated release for KPI CEE Analyzer (Rust version).

        Download the executable for your operating system below.

        ### How to Run:

        **Linux:**
        1. Download `kpi_cee-linux.tar.gz`.
        2. Extract: `tar -xzvf kpi_cee-linux.tar.gz`.
        3. Make executable: `chmod +x kpi_cee/kpi_cee`
        4. Run: `./kpi_cee/kpi_cee`. Your browser should open automatically.

        **Windows:**
        1. Download `kpi_cee-windows.zip`.
        2. Extract the archive.
        3. Double-click `kpi_cee.exe`. Your browser should open automatically.

        EOF

        # Find and upload all artifacts
        find artifacts -name "*.zip" -o -name "*.tar.gz" | while read -r file; do
          echo "Found: $file"
        done

        # Create release and upload files
        gh release create ${TAG} \
          --title "Release ${TAG}" \
          --notes-file release_notes.md \
          artifacts/*/*.zip \
          artifacts/*/*.tar.gz
